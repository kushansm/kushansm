name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # To include private repositories, create a Personal Access Token (PAT)
          # with `repo` and `read:user` and add it as a secret named METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}

          # Options
          user: kushansm
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo
          
          # Plugins
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
