name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: kushansm
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo
          config_animations: yes
          config_display: large
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: kushansm
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Commit snake
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Generated animated snake" || exit 0
          git push origin main
