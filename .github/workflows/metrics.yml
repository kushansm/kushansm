name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Sleek Modern Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: kushansm
          template: classic
          config_theme: transparent
          base: header, activity, repositories
          base_indepth: yes
          config_timezone: Asia/Colombo
          config_animations: yes
          
          # Refined Languages Section
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 5
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used

      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: kushansm
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark&color_snake=#58A6FF&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit snake
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Generated animated snake" || exit 0
          git push origin main
